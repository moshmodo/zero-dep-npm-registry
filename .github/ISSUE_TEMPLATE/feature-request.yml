name: 🙏 Feature Request
description: Ask for a new feature or improvement to the zero-dependency registry.
title: "[Feature Request] "
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping keep the zero-dependency registry clean! Please fill out the form below to suggest a new feature or improvement.

  - type: textarea
    id: feature
    attributes:
      label: Feature / Improvement Description
      description: Describe the feature or improvement you would like to see in the zero-dependency registry
      placeholder: I would like an option to filter packages by license type.
    validations:
      required: true
